name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on a branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Static analysis + assemble
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # The gate: detekt (code smells) + ktlint (formatting). Any violation
      # fails the job, so it cannot be merged.
      - name: Static analysis
        run: ./gradlew detekt ktlintCheck --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload analysis reports on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: static-analysis-reports
          path: |
            **/build/reports/detekt/
            **/build/reports/ktlint/
          retention-days: 7
